<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Elysium Labs</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/favicon-3d-32.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
<style>
  :root{--ink:#141210;--mut:#6e6a64;--blue:#0000F2}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);min-height:100vh;
    display:grid;place-items:center;text-align:center;padding:24px;
    background:radial-gradient(135% 95% at 50% -8%,#ffffff 0%,#f6f4f0 55%,#efece6 100%)}
  .wrap{max-width:440px;display:flex;flex-direction:column;align-items:center;gap:6px}
  svg{width:120px;height:auto;margin-bottom:18px;animation:bob 4.6s ease-in-out infinite;
    filter:drop-shadow(0 14px 14px rgba(20,18,16,.18))}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  #armR{transform-box:fill-box;transform-origin:50% 9%;animation:scratch 3.4s ease-in-out infinite}
  @keyframes scratch{0%,55%,100%{transform:rotate(-8deg)}62%{transform:rotate(-118deg)}72%{transform:rotate(-110deg)}82%{transform:rotate(-120deg)}92%{transform:rotate(-112deg)}}
  h1{font-size:clamp(4rem,14vw,6rem);font-weight:600;letter-spacing:-.04em;line-height:1}
  h1 em{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:var(--blue)}
  p{color:var(--mut);font-weight:300;margin:10px 0 26px;line-height:1.6}
  a.pill{display:inline-flex;align-items:center;gap:9px;background:var(--ink);color:#fff;
    border-radius:100px;padding:13px 24px;font-size:14px;font-weight:500;text-decoration:none;
    transition:background .25s,transform .25s}
  a.pill:hover{background:#000;transform:translateY(-1px)}
  @media(prefers-reduced-motion:reduce){svg,#armR{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <svg viewBox="0 0 120 120" aria-hidden="true">
    <defs>
      <radialGradient id="b" cx="40%" cy="28%" r="82%"><stop offset="0" stop-color="#fff"/><stop offset=".55" stop-color="#eef0f6"/><stop offset="1" stop-color="#c6cad8"/></radialGradient>
      <linearGradient id="v" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3350dd"/><stop offset=".5" stop-color="#1a2a9e"/><stop offset="1" stop-color="#0c1245"/></linearGradient>
      <linearGradient id="t" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7fe9ef"/><stop offset="1" stop-color="#2eb6c0"/></linearGradient>
    </defs>
    <rect x="58" y="5" width="4" height="13" rx="2" fill="#cdd2df"/><circle cx="60" cy="5" r="5" fill="#57d9e0"/>
    <g id="armL"><rect x="22" y="68" width="13" height="30" rx="6.5" fill="url(#b)"/><circle cx="28.5" cy="98" r="8" fill="url(#t)"/></g>
    <g id="armR"><rect x="85" y="68" width="13" height="30" rx="6.5" fill="url(#b)"/><circle cx="91.5" cy="98" r="8" fill="url(#t)"/></g>
    <ellipse cx="60" cy="83" rx="30" ry="25" fill="url(#b)"/>
    <path d="M46 81 Q60 103 74 81 Q60 91 46 81Z" fill="url(#t)"/>
    <rect x="24" y="41" width="12" height="20" rx="6" fill="url(#t)"/><rect x="84" y="41" width="12" height="20" rx="6" fill="url(#t)"/>
    <circle cx="60" cy="45" r="28" fill="url(#b)"/>
    <rect x="39" y="32" width="42" height="28" rx="14" fill="url(#v)"/>
    <g fill="#7cf0ff">
      <rect x="47.5" y="42" width="9.5" height="8" rx="4" transform="rotate(8 52 46)"/>
      <rect x="63" y="41" width="9.5" height="10" rx="4.5"/>
    </g>
    <text x="60" y="27" text-anchor="middle" font-size="10" fill="#8a857c" font-family="Inter">?</text>
  </svg>
  <h1>4<em>0</em>4</h1>
  <p>This page doesn't exist. Yet.<br>Want us to build it?</p>
  <a class="pill" href="/">Back to Elysium Labs →</a>
</div>
</body>
</html>
